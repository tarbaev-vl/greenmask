name: Deploy documentation

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      buid-tag:
        required: false
        type: string

jobs:
  deploy-docs:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python-version }}

      - name: Install dependicies
        run: pip install -r requirements.txt

      - name: Setup docs deploy
        run: |
          git config --global user.name "Greenmask CI"
          git config --global user.email ci@greenmask.io

      - name: Build dev docs
        if: github.ref == 'refs/heads/main'
        run: mike deploy dev

      - name: Build release docs
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [[ "${{ inputs.buid-tag }}" == *"rc"* || "${{ inputs.buid-tag }}" == *"dev"* || "${{ inputs.buid-tag }}" == *"pre"* || "${{ inputs.buid-tag }}" == *"beta"* || "${{ inputs.buid-tag }}" == *"b"* ]]; then
            mike deploy $tag
          else
            mike deploy --update-aliases $tag latest
          fi

      - name: Set latest version as default
        if: startsWith(github.ref, 'refs/tags/v')
        run: mike set-default latest

      - name: Change branch to get html files
        run: git push origin gh-pages