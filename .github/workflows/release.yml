name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'LICENSE'
      - 'getting_started.md'

env:
  go-version: '1.22.6'
  python-version: 'pypy3.10'

jobs:
  get-tag:
    runs-on: ubuntu-22.04
    steps:
      - name: Get Git tag
        run: echo "TAG=$(git tag --points-at HEAD)" >> $GITHUB_ENV

  tests:
    uses: ${{ github.repository }}/.github/workflows/tests.yml@${{ env.TAG }}
    with:
      go-version: ${{ env.go-version }}

  build:
    uses: ${{ github.repository }}/.github/workflows/build.yml@${{ env.TAG }}
    needs: 
      - tests
    with:
      go-version: ${{ env.go-version }}
      buid-tag: ${{ env.TAG }}

  docs:
    uses: ${{ github.repository }}/.github/workflows/docs.yml@${{ env.TAG }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: 
      - build
    with:
      python-version: ${{ env.python-version }}
      buid-tag: ${{ env.TAG }}
      